name: System Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"
  schedule:
    - cron:  '00 03 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build layer
        run: |
          ARCH=amd64 PYTHON_VERSION=3.13 ./scripts/build_layers.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          path: .layers/datadog_lambda_py-amd64-3.13.zip
          name: binaries

  system-tests:
    needs:
      - build
    uses: DataDog/system-tests/.github/workflows/system-tests.yml@1e5d6b7096279ca43ce4826fda3cc805635b63c1
    permissions:
      contents: read
      id-token: write
    with:
      library: python_lambda
      ref: 1e5d6b7096279ca43ce4826fda3cc805635b63c1
      binaries_artifact: binaries
      scenarios_groups: tracer_release
      skip_empty_scenarios: true
      push_to_test_optimization: true
